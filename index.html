<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Graphic Radio | Diseño Gráfico · Audio · Emisoras Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      // ADMIN CONTROL - Solo se activa con #admin en la URL
      (function() {
        if (window.location.hash === '#admin') {
          localStorage.setItem('vgr_admin_mode', 'true');
          sessionStorage.setItem('vgr_admin_session', '1');
        } else {
          localStorage.removeItem('vgr_admin_mode');
          sessionStorage.removeItem('vgr_admin_session');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/assets/index.js"></script>
  </body>
</html>
