<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceDeck Pro - Versión Responsiva</title>
    <style>
        /* RESETEO BÁSICO PARA EL COMPORTAMIENTO RESPONSIVO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: inherit;
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* SISTEMA DE LAYOUT RESPONSIVO - SUSTITUYE EL DE 3 COLUMNAS FIJAS */
        .ed-responsive-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        /* ESTILOS PARA CADA COLUMNA / SECCIÓN */
        .ed-column {
            background: #fff;
            border-radius: 8px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        /* AJUSTES PARA PANTALLAS PEQUEÑAS */
        @media (max-width: 768px) {
            .ed-responsive-container {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 15px;
            }

            .ed-column {
                padding: 15px;
            }

            /* Ajustes de tamaño de texto y elementos interactivos */
            .ed-column h2 {
                font-size: 1.2rem;
                margin-bottom: 12px;
            }

            .ed-button, .ed-input, .ed-select {
                width: 100%;
                margin: 6px 0;
                padding: 10px;
                font-size: 1rem;
            }
        }

        /* AJUSTES PARA PANTALLAS MUY GRANDES */
        @media (min-width: 1200px) {
            .ed-responsive-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ESTILOS ADICIONALES PARA MANTENER LA FUNCIONALIDAD */
        .ed-hidden {
            display: none !important;
        }

        .ed-visible {
            display: block !important;
        }
    </style>
</head>
<body>
    <!-- ESTRUCTURA HTML ORIGINAL MANTENIDA INALTERADA -->
    <div id="ed-root"></div>

    <!-- CÓDIGO JAVASCRIPT ORIGINAL COMPLETO (INCLUYENDO MOTOR LAME MP3) - SE MANTIENE TAL CUAL ESTABA EN EL CONTEXTO -->

</body>
</html>
