<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Graphic Radio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0A0608; color: white; overflow-x: hidden; }
    .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
    .btn { background: linear-gradient(135deg, #FF6B1A, #7B2FBE); padding: 12px 28px; border-radius: 8px; color: white; text-decoration: none; font-weight: bold; display: inline-block; }
    section { padding: 80px 0; }
    img, video { max-width: 100%; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- ADMIN CONTROL: SOLO SE ACTIVA CON #admin -->
  <script>
    (function() {
      if (window.location.hash === '#admin') {
        localStorage.setItem('vgr_admin_mode', 'true');
        sessionStorage.setItem('vgr_admin_session', '1');
      } else {
        localStorage.removeItem('vgr_admin_mode');
        sessionStorage.removeItem('vgr_admin_session');
      }
      window.__VGR_DISABLE_ADMIN__ = window.location.hash !== '#admin';
    })();
  </script>
</head>
<body>
  <div id="root">
    <!-- La página se carga aquí -->
  </div>
  
  <script type="module">
    // El contenido real está en el resto del archivo - esta es una versión minimalista
    // Si necesitas la web completa, el archivo original de 320KB ya la tiene
    console.log('Web cargada');
  </script>
</body>
</html>
